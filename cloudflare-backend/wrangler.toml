# wrangler.toml — Renia AI Cloudflare Workers Config

name = "renia-ai-backend"
main = "src/index.js"
compatibility_date = "2026-05-23"

# Environment Variables
[vars]
APP_NAME = "Renia AI"
XAI_BASE_URL = "https://api.x.ai/v1"
# JWT_SECRET and ENCRYPTION_KEY should be set securely via:
# wrangler secret put JWT_SECRET
# wrangler secret put ENCRYPTION_KEY

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "grokdent-d1"
database_id = "d615d9f9-add9-4f82-985d-30adc6da13dd" # Will be provisioned during wrangler d1 create

# Cloudflare R2 Storage Bucket Binding (for call recordings/transcripts)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "grokdent-r2"
preview_bucket_name = "grokdent-r2-preview"

# Durable Object for real-time dashboard WebSocket streaming
[[durable_objects.bindings]]
name = "REALTIME_DO"
class_name = "RealtimeDashboardDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeDashboardDO"]
