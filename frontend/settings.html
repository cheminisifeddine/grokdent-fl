<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renia AI - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            accent: {
              indigo: '#6366F1',
              teal: '#0FD8B6',
              coral: '#FF6B4A'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FAFAFC; }
    .glass-card {
      background: #FFFFFF;
      border: 1px solid #E2E2EC;
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
    }
    .nav-item {
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(15, 216, 182, 0.08));
      color: #6366F1;
      border-color: rgba(99, 102, 241, 0.2);
    }
    .nav-item.active {
      box-shadow: inset 0 0 12px rgba(99, 102, 241, 0.03);
      font-weight: 600;
    }
  </style>
</head>
<body class="text-slate-800 antialiased h-screen overflow-hidden flex">

  <!-- Sidebar -->
  <aside class="w-[280px] bg-white/80 backdrop-blur-xl border-r border-slate-200 flex flex-col justify-between h-full z-20 shrink-0">
    <div>
      <div class="px-6 py-8 flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-500 to-teal-400 flex items-center justify-center text-white text-sm shadow-lg shadow-indigo-500/20">🦷</div>
        <span class="font-display font-bold text-xl tracking-tight text-slate-900">Renia AI</span>
      </div>

      <nav class="px-4 space-y-1">
        <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[20px]">dashboard</span> Dashboard
        </a>
        <a href="calls.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[20px]">call</span> Calls
        </a>
        <a href="appointments.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[20px]">calendar_month</span> Appointments
        </a>
        <a href="knowledge-base.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[20px]">menu_book</span> Knowledge Base
        </a>
        <a href="analytics.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[20px]">insights</span> Analytics
        </a>
      </nav>
    </div>

    <div class="px-4 pb-8">
      <div class="mb-4">
        <a href="settings.html" class="nav-item active flex items-center gap-3 px-4 py-2 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[18px]">settings</span> Settings
        </a>
        <a href="billing.html" class="nav-item flex items-center gap-3 px-4 py-2 rounded-xl text-sm font-medium text-slate-600 border border-transparent">
          <span class="material-symbols-outlined text-[18px]">credit_card</span> Billing
        </a>
      </div>
      
      <div class="p-4 rounded-xl border border-slate-100 bg-slate-50 flex items-center justify-between cursor-pointer hover:bg-slate-100 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xs">SM</div>
          <div>
            <div class="text-sm font-bold text-slate-900">Dr. Sarah M.</div>
            <div class="text-xs text-slate-500">Admin</div>
          </div>
        </div>
        <span class="material-symbols-outlined text-[18px] text-slate-400">logout</span>
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50/50">
    
    <!-- Topbar -->
    <header class="h-[80px] px-8 flex items-center justify-between border-b border-slate-200/60 bg-white/50 backdrop-blur-md z-10 shrink-0">
      <h1 class="font-display text-2xl font-bold text-slate-900 tracking-tight">Settings</h1>
      
      <button class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md shadow-indigo-500/20 hover:bg-indigo-700 transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">save</span> Save Changes
      </button>
    </header>

    <!-- Scrollable Page Content -->
    <div class="flex-1 overflow-y-auto p-8">
      <div class="max-w-[1000px] mx-auto flex gap-8">
        
        <!-- Tabs Menu -->
        <div class="w-[200px] shrink-0 space-y-1">
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold bg-indigo-50 text-indigo-600 shadow-sm border border-indigo-100">Clinic Profile</button>
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-white hover:text-slate-900 border border-transparent transition-colors">Office Hours</button>
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-white hover:text-slate-900 border border-transparent transition-colors">Services</button>
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-white hover:text-slate-900 border border-transparent transition-colors">AI Voice settings</button>
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-white hover:text-slate-900 border border-transparent transition-colors">Emergency Protocol</button>
        </div>

        <!-- Settings Content -->
        <div class="flex-1">
          <div class="glass-card rounded-2xl p-8">
            <h2 class="font-display text-xl font-bold text-slate-900 mb-6">Clinic Profile</h2>
            
            <div class="space-y-5">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Clinic Name</label>
                <input type="text" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 transition-colors" value="Sunshine Dental Care">
              </div>
              
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Public Email</label>
                <input type="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 transition-colors" value="hello@sunshinedental.com">
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Phone Number</label>
                <input type="tel" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 transition-colors" value="(305) 555-0100">
              </div>
              
              <div class="grid grid-cols-2 gap-5">
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-1.5">City (Florida)</label>
                  <input type="text" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 transition-colors" value="Miami">
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-1.5">ZIP Code</label>
                  <input type="text" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:border-indigo-500 transition-colors" value="33101">
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
