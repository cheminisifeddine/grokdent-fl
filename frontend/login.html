<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renia AI - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <!-- Animated Gradient Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-logo">🦷 Renia AI</div>
    <p class="login-subtitle">AI Voice Receptionist for Florida Dental Clinics</p>

    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" class="input" placeholder="you@clinic.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" class="input" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg">Sign In</button>

      <div id="login-error" class="login-error"></div>
    </form>

    <div class="login-footer">
      New clinic? <a href="signup.html">Sign up here →</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="page-footer">© 2026 Renia AI — AI-Powered Dental Reception</div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
