<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renia AI - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <!-- Animated Gradient Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-logo flex items-center justify-center gap-2.5">
      <svg class="w-10 h-10" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#0FD8B6" />
          </linearGradient>
        </defs>
        <path d="M6 10C6 7.79086 7.79086 6 10 6C12.2091 6 14 7.79086 14 10V18C14 20.2091 12.2091 22 10 22C7.79086 22 6 20.2091 6 18V10Z" fill="url(#logo-grad)" opacity="0.85"/>
        <path d="M18 10C18 7.79086 19.7909 6 22 6C24.2091 6 26 7.79086 26 10V18C26 20.2091 24.2091 22 22 22C19.7909 22 18 20.2091 18 18V10Z" fill="url(#logo-grad)" opacity="0.85"/>
        <rect x="13" y="10" width="6" height="14" rx="3" fill="url(#logo-grad)"/>
        <rect x="9" y="10" width="2" height="6" rx="1" fill="#FFFFFF"/>
        <rect x="21" y="10" width="2" height="6" rx="1" fill="#FFFFFF"/>
        <rect x="15" y="12" width="2" height="10" rx="1" fill="#FFFFFF"/>
      </svg>
      <span>Renia AI</span>
    </div>
    <p class="login-subtitle">AI Voice Receptionist for Florida Dental Clinics</p>

    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" class="input" placeholder="you@clinic.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" class="input" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg">Sign In</button>

      <div id="login-error" class="login-error"></div>
    </form>

    <div class="login-footer">
      New clinic? <a href="signup.html">Sign up here →</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="page-footer">© 2026 Renia AI — AI-Powered Dental Reception</div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
